name: docker
on:
  push:
    branches: [main]
    tags: '*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Get Commit or Tag
        id: vars
        run: |
          tag="${GITHUB_SHA:0:8}"
          if [[ ${GITHUB_REF} == refs/tags* ]]; then
            ref="${GITHUB_REF}"
            tag=$(echo $GITHUB_REF | sed 's/refs\/tags\///g')
          fi
          echo "TAG=$tag" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        if: success() && github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: false
          tags: cboin/songbirdweb:latest,cboin/songbirdweb:${{steps.vars.outputs.TAG}}
          cache-from: type=registry,ref=cboin/songbirdweb:buildcache
          cache-to: type=registry,ref=cboin/songbirdweb:buildcache,mode=max
      - name: Build and Push
        if: success() && (github.event_name == 'push' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: cboin/songbirdweb:latest,cboin/songbirdweb:${{steps.vars.outputs.TAG}}
          cache-from: type=registry,ref=cboin/songbirdweb:buildcache
          cache-to: type=registry,ref=cboin/songbirdweb:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEEBOX_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -4 -p 223 ${{ secrets.KEEBOX_HOST }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host ${{ secrets.KEEBOX_HOST }}
            HostName ${{ secrets.KEEBOX_HOST }}
            User ${{ secrets.KEEBOX_USER }}
            Port 223
            IdentityFile ~/.ssh/deploy_key
            AddressFamily inet
            StrictHostKeyChecking no
          EOF

      - name: Deploy to keebox
        run: |
          ssh ${{ secrets.KEEBOX_HOST }} 'bash -s' << 'ENDSSH'
            set -e
            docker system prune -f
            cd ~/songbird
            # Pull explicitly + force-recreate. docker-compose up -d alone
            # can skip recreating if it thinks the image hasn't changed
            # (manifest-vs-cache races against a fresh push), which leaves
            # the old container running.
            docker-compose pull songbirdweb
            docker-compose up -d --force-recreate songbirdweb
            healthy=
            for i in $(seq 1 30); do
              if curl -sf http://localhost:6996 -o /dev/null; then
                healthy=1
                echo "healthy"
                break
              fi
              sleep 3
            done
            [ "$healthy" = "1" ] || (echo "deploy health-check FAILED" && docker-compose logs --tail=50 songbirdweb && exit 1)
          ENDSSH
