name: test

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint disabled until ESLint flat-config migration. `next lint` is deprecated
  # and prompts interactively in CI when no eslint config exists.
  # lint:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: 22
  #         cache: 'npm'
  #     - name: Install dependencies
  #       run: make install
  #     - name: Lint
  #       run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Typecheck
        run: make typecheck

      - name: Build
        run: make build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: dev
            browser: chromium
            make_target: test-e2e
            needs_dev_server: true
          - project: mobile
            browser: webkit
            make_target: test-e2e-mobile
            needs_dev_server: true
          - project: prod
            browser: chromium
            make_target: test-e2e-prod
            needs_dev_server: false
    name: e2e (${{ matrix.project }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: make install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start API stack
        run: make e2e-api-up E2E_API_PORT=8000 E2E_WEB_PORT=3000

      - name: Start Next.js dev server
        if: matrix.needs_dev_server
        run: make e2e-next-up E2E_WEB_PORT=3000 E2E_API_PORT=8000

      - name: Run E2E tests (${{ matrix.project }})
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          E2E_API_BASE_URL: http://localhost:8000
          E2E_WEB_URL: http://localhost:3000
          TEST_USERNAME: e2e-user
          TEST_PASSWORD: e2e-user-pass
          E2E_ADMIN_USERNAME: e2e-admin
          E2E_ADMIN_PASSWORD: e2e-admin-pass
          E2E_EDITOR_USERNAME: e2e-editor
          E2E_EDITOR_PASSWORD: e2e-EditorPass-1
          E2E_BULK_USERNAME: e2e-bulk
          E2E_BULK_PASSWORD: e2e-BulkPass-1
          E2E_IMPORT_USERNAME: e2e-import
          E2E_IMPORT_PASSWORD: e2e-ImportPass-1
        run: make ${{ matrix.make_target }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7
