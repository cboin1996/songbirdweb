name: test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: make install

      # Lint disabled until ESLint flat-config migration. `next lint` is deprecated
      # and prompts interactively in CI when no eslint config exists. See known-issues.md.
      # - name: Lint
      #   run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Build
        run: make build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
