  #         node-version: 22
  #         cache: 'npm'
  #     - name: Install dependencies
  #       run: make install
  #     - name: Install Playwright browsers
  #       run: npx playwright install --with-deps chromium
  #     - name: Run E2E tests
  #       run: make test-e2e
