name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEEBOX_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 223 ${{ secrets.KEEBOX_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to keebox
        run: |
          ssh -i ~/.ssh/deploy_key -p 223 -o StrictHostKeyChecking=no keenan@${{ secrets.KEEBOX_HOST }} 'bash -s' << 'ENDSSH'
            set -e
            cd ~/songbird
            git pull
            docker-compose pull
            docker-compose up -d
          ENDSSH
