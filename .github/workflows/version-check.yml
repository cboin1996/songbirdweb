name: version-check
on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bumped
        run: |
          git fetch origin main

          MAIN_VERSION=$(git show origin/main:package.json | jq -r '.version')
          PR_VERSION=$(jq -r '.version' package.json)

          echo "main: package.json=$MAIN_VERSION"
          echo "pr:   package.json=$PR_VERSION"

          if [ "$MAIN_VERSION" = "$PR_VERSION" ]; then
            echo "::error::package.json version not bumped (still $PR_VERSION)"
            exit 1
          fi
          echo "OK: $MAIN_VERSION -> $PR_VERSION"
